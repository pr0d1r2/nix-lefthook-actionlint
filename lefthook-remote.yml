---
pre-commit:
  commands:
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: timeout ${LEFTHOOK_ACTIONLINT_TIMEOUT:-30} lefthook-actionlint {staged_files}

pre-push:
  commands:
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: timeout ${LEFTHOOK_ACTIONLINT_TIMEOUT:-30} lefthook-actionlint {push_files}
